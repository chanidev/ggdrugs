# GGdrugs 로컬 개발 오케스트레이션
#
# 사용법:
#   docker compose up -d                     # 전체 기동
#   docker compose up -d postgres qdrant redis   # 데이터 레이어만
#   docker compose logs -f bff               # 특정 서비스 로그
#   docker compose down                       # 정지
#   docker compose down -v                    # 정지 + 볼륨 삭제 (DB 초기화)
#
# Phase 0: 데이터 레이어만 정의. apps/services 컨테이너는 Phase 1 이후 활성화.

name: ggdrugs

services:
  # -------- 데이터 레이어 --------

  postgres:
    image: postgis/postgis:15-3.4
    container_name: ggdrugs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ggdrugs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ggdrugs_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ggdrugs}
    ports:
      # 호스트 5432는 시스템 Postgres가 선점할 수 있어 5433으로 노출
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ggdrugs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: ggdrugs-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ggdrugs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO: S3 호환 오브젝트 스토리지 (ADR 0002)
  # 대상: approval_documents, review_photos, 이벤트 포스터, photos
  # 콘솔 UI: http://localhost:9001
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ggdrugs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ggdrugs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ggdrugs_dev_minio}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 웹 콘솔
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------- 애플리케이션 레이어 (Phase 1 이후 활성화) --------
  # 아래 서비스들은 Dockerfile이 준비되면 주석을 해제한다.
  #
  # bff:
  #   build:
  #     context: ./apps/bff
  #     dockerfile: ../../infra/docker/bff.Dockerfile
  #   container_name: ggdrugs-bff
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-ggdrugs}:${POSTGRES_PASSWORD:-ggdrugs_dev}@postgres:5432/${POSTGRES_DB:-ggdrugs}
  #     REDIS_URL: redis://redis:6379
  #     QDRANT_URL: http://qdrant:6333
  #     LLM_SERVICE_URL: http://llm:8000
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: ${MINIO_ROOT_USER:-ggdrugs}
  #     S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-ggdrugs_dev_minio}
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #
  # llm:
  #   build:
  #     context: ./services/llm
  #     dockerfile: ../../infra/docker/llm.Dockerfile
  #   container_name: ggdrugs-llm
  #   restart: unless-stopped
  #   environment:
  #     QDRANT_URL: http://qdrant:6333
  #     REDIS_URL: redis://redis:6379
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #
  # web:
  #   build:
  #     context: ./apps/web
  #     dockerfile: ../../infra/docker/web.Dockerfile
  #   container_name: ggdrugs-web
  #   restart: unless-stopped
  #   environment:
  #     VITE_BFF_URL: http://localhost:3000
  #   ports:
  #     - "5173:5173"
